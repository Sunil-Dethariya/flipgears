<!DOCTYPE html>
{% load static %}
<html>
<head>
  <title>Login | FlipGears</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'seller/css/seller.css' %}">
</head>

<body class="bg-light">



{% if messages %}
<div class="position-fixed top-0 end-0 p-3" style="z-index:9999">
    {% for message in messages %}
    <div class="toast show align-items-center text-white bg-success border-0 mb-2">
        <div class="d-flex">
            <div class="toast-body">
                {{ message }}
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    setTimeout(() => {
        document.querySelectorAll('.toast').forEach(el => el.remove());
    }, 3000); // 3 sec me hide
</script>
{% endif %}



<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow hover-card" style="width:400px;">

    <h4 class="text-center mb-3">Welcome Back to FlipGears</h4>
    <p class="text-center text-muted">Seller / Technician / User Login</p>

    <form method="POST" action="{% url 'fetchlogindata' %}" onsubmit="return validateLogin()">
      {% csrf_token %}

      <!-- EMAIL -->
      <input class="form-control mb-3"
             type="email"
             name="email"
             placeholder="Email"
             required>

      <!-- PASSWORD -->
      <div class="position-relative">
        <input class="form-control mb-3"
               type="password"
               name="password"
               id="password"
               placeholder="Password"
               required>
      </div>

      <button class="btn btn-info w-100 text-white">Login</button>
    </form>

    <p class="text-center mt-3">
      New user? <a href="{% url 'register' %}">Register here</a>
    </p>

  </div>
</div>

<!-- ­¤öź JS -->
<script>

// LOGIN VALIDATION
function validateLogin() {
    const email = document.querySelector('[name="email"]').value;
    const password = document.querySelector('[name="password"]').value;

    // EMAIL CHECK
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert("Enter valid email");
        return false;
    }

    // PASSWORD CHECK
    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
    }

    return true;
}

// ­¤æü SHOW/HIDE PASSWORD
function togglePassword() {
    const pass = document.getElementById("password");

    if (pass.type === "password") {
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}

</script>

</body>
</html>
