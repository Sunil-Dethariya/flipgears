<!DOCTYPE html>
{% load static %}
<html>
<head>
  <title>User Register | FlipGears</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'seller/css/seller.css' %}">
</head>

<body class="bg-light">


{% if messages %}
<div class="position-fixed top-0 end-0 p-3" style="z-index:9999">
    {% for message in messages %}
    <div class="toast show align-items-center text-white bg-success border-0 mb-2">
        <div class="d-flex">
            <div class="toast-body">
                {{ message }}
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<script>
    setTimeout(() => {
        document.querySelectorAll('.toast').forEach(el => el.remove());
    }, 3000); // 3 sec me hide
</script>
{% endif %}



<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow hover-card" style="width:400px;">

    <h4 class="text-center mb-3">Create Your FlipGears Account</h4>

    <form action="{% url 'fetchregisterdata' %}" method="POST" onsubmit="return validateForm()">
      {% csrf_token %}

      <!-- USERNAME -->
      <input class="form-control mb-3"
             name="username"
             placeholder="Username"
             pattern="[A-Za-z0-9_]{3,}"
             title="Minimum 3 characters (letters, numbers, underscore)"
             required>

      <!-- EMAIL -->
      <input type="email"
             class="form-control mb-3"
             name="email"
             placeholder="Email"
             required>

      <!-- PHONE -->
      <input type="tel"
             class="form-control mb-3"
             name="phone"
             placeholder="Phone"
             maxlength="10"
             pattern="[0-9]{10}"
             oninput="this.value = this.value.replace(/[^0-9]/g, '')"
             required>

      <!-- PASSWORD -->
      <input type="password"
             class="form-control mb-3"
             name="password"
             placeholder="Password"
             minlength="6"
             required>

      <!-- ROLE -->
<select class="form-control mb-3" name="role" required>
    <option value="">Select role</option>
    <option value="User" selected>User</option>
    <option value="Seller">Seller</option>
    <option value="Technician">Technician</option>
</select>

      <button class="btn btn-info w-100 text-white">Register</button>
    </form>

    <p class="text-center mt-3">
      Already have account? <a href="{% url 'login' %}">Login</a>
    </p>

  </div>
</div>

<!-- 🔥 VALIDATION SCRIPT -->
<script>
function validateForm() {

    const username = document.querySelector('[name="username"]').value;
    const phone = document.querySelector('[name="phone"]').value;
    const password = document.querySelector('[name="password"]').value;

    // USERNAME
    if (!/^[A-Za-z0-9_]{3,}$/.test(username)) {
        alert("Username must be at least 3 characters (letters, numbers, underscore)");
        return false;
    }

    // PHONE
    if (!/^[0-9]{10}$/.test(phone)) {
        alert("Phone must be exactly 10 digits");
        return false;
    }

    // PASSWORD
    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
    }

    return true;
}

// 🔥 REAL-TIME INPUT CONTROL
document.addEventListener("input", function(e) {
    if (e.target.name === "phone") {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
    }
});
</script>

</body>
</html>
