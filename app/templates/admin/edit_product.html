

    <style>

/* ===============================
   PAGE HEADER
================================*/

.page-header{
    position: relative;
    padding: 90px 0;
    color: #fff;
}

.page-header__inner{
    text-align:left;
}


/* Background Image */
.page-header__bg{
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-color: #131222;
    background-size: cover;
    background-position: center;
    z-index:-1;
}

/* Content */
.page-header__inner h3{
    font-size:38px;
    color:white;
    font-weight:700;
    margin-bottom:10px;
    letter-spacing:1px;
}

/* Breadcrumb */

.thm-breadcrumb{
    display:flex;
    justify-content:flex-start;
    gap:8px;
}

.thm-breadcrumb li{
    font-size:15px;
}

.thm-breadcrumb li a{
    color:#ddd;
    text-decoration:none;
    transition:0.3s;
}

.thm-breadcrumb li a:hover{
    color:#fff;
}

/* ===============================
   RESPONSIVE
================================*/

@media (max-width:768px){

.page-header{
    padding:70px 0;
}

.page-header__inner h3{
    font-size:28px;
}

}
/* ===============================
   PAGE HEADER END
================================*/

</style>


  <!--Page Header Start -->
        <section class="page-header">
            <div class="page-header__bg">
            </div>
            <div class="page-header__shape-1"></div>
            <div class="container">
                <div class="page-header__inner">
                    <h3>Edit Product</h3>
                    <div class="thm-breadcrumb__inner">
                        <ul class="thm-breadcrumb list-unstyled">
                            <li><a href="{% url 'seller' %}">Home</a></li>

                        </ul>

                    </div>
                </div>
            </div>
        </section>
        <!--Page Header End -->


<div class="product-card">
    <h2>Edit Product</h2>
<form action="{% url 'edit_product' product.id %}" method="POST" enctype="multipart/form-data">
{% csrf_token %}

<!-- Product Name -->
<div class="mb-3">
    <label class="form-label">Product Name</label>
    <input type="text" name="name"
           value="{{ product.name }}"
           class="form-control" required>
</div>

<!-- Category -->
<div class="mb-3">
    <label class="form-label">Product Type</label>
    <select name="catid" class="form-select" required>
        <option value="">-- Select Product Type --</option>
        {% for cat in categories %}
        <option value="{{cat.id}}"
        {% if cat.id == product.cat_id.id %}selected{% endif %}>
            {{cat.catname}}
        </option>
        {% endfor %}
    </select>
</div>

<!-- Image -->
<div class="mb-3">
    <label class="form-label">Current Image</label><br>
    {% if product.img %}
        <img src="{{ product.img.url }}" width="100" class="mb-2">
    {% endif %}
    <input type="file" name="img" class="form-control">
</div>

<!-- Price -->
<div class="mb-3">
    <label class="form-label">Price</label>
    <input type="number" step="0.01"
           name="price"
           value="{{ product.price }}"
           class="form-control" required>
</div>

<!-- Description -->
<div class="mb-3">
    <label class="form-label">Description</label>
    <textarea name="desc"
              class="form-control"
              rows="4">{{ product.desc }}</textarea>
</div>

<!-- Status -->
<div class="mb-4">
    <label class="form-label">Status</label>
    <select name="status" class="form-select">
        <option value="active"
        {% if product.status == "active" %}selected{% endif %}>
            Active
        </option>

        <option value="inactive"
        {% if product.status == "inactive" %}selected{% endif %}>
            Inactive
        </option>
    </select>
</div>

<div class="d-grid">
    <button type="submit" class="btn btn-warning text-white">
        Update Product
    </button>
</div>

</form>
</div>
