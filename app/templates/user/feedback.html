{% extends 'user/base.html' %}
{% block content %}


<head>
    <style>
        body {
    background-color: #f5f7fa;
    }

    .card {
        border: none;
    }

    .btn-info {
        background-color: #17c1c9;
        border: none;
    }

    .btn-info:hover {
        background-color: #0ea5a8;
    }

    .star-rating {
        font-size: 30px;
        cursor: pointer;
        color: #ccc;
    }

    .star-rating span:hover,
    .star-rating span.active {
        color: #ffc107;
    }


            /* ===============================
       PAGE HEADER
    ================================*/

    .page-header{
        position: relative;
        padding: 90px 0;
        color: #fff;
    }

    .page-header__inner{
        text-align:left;
    }


    /* Background Image */
    .page-header__bg{
        position: absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background-color: #131222;
        background-size: cover;
        background-position: center;
        z-index:-1;
    }

    /* Content */
    .page-header__inner h3{
        font-size:38px;
        color:white;
        font-weight:700;
        margin-bottom:10px;
        letter-spacing:1px;
    }

    /* Breadcrumb */

    .thm-breadcrumb{
        display:flex;
        justify-content:flex-start;
        gap:8px;
    }

    .thm-breadcrumb li{
        font-size:15px;
    }

    .thm-breadcrumb li a{
        color:#ddd;
        text-decoration:none;
        transition:0.3s;
    }

    .thm-breadcrumb li a:hover{
        color:#fff;
    }

    /* ===============================
       RESPONSIVE
    ================================*/

    @media (max-width:768px){

    .page-header{
        padding:70px 0;
    }

    .page-header__inner h3{
        font-size:28px;
    }

    }
    /* ===============================
       PAGE HEADER END
    ================================*/
    </style>
</head>
 <!--Page Header Start -->
        <section class="page-header">
            <div class="page-header__bg" style="background-image: url(static/assets/images/backgrounds/page-header-bg.jpg);">
            </div>
            <div class="page-header__shape-1"></div>
            <div class="container">
                <div class="page-header__inner">
                    <h3>Feedback</h3>
                    <div class="thm-breadcrumb__inner">
                        <ul class="thm-breadcrumb list-unstyled">
                            <li><a href="/">Home</a></li>

                        </ul>
                    </div>
                </div>
            </div>
        </section>
        <!--Page Header End -->

<!-- feedback form -->
   <div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4" style="border-radius:15px;">

                <h3 class="text-center mb-4">Give Feedback</h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Rating</label>

                        <div class="star-rating">
                            <span data-value="1">★</span>
                            <span data-value="2">★</span>
                            <span data-value="3">★</span>
                            <span data-value="4">★</span>
                            <span data-value="5">★</span>
                        </div>

                        <!-- Hidden input -->
                        <input type="hidden" name="rating" id="rating" required>
                    </div>


                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea name="message" rows="4" class="form-control" placeholder="Write your feedback..." required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-info text-white">Submit Feedback</button>
                    </div>

                </form>
                <script>
                    const stars = document.querySelectorAll(".star-rating span");
                    const ratingInput = document.getElementById("rating");

                    stars.forEach((star, index) => {
                        star.addEventListener("click", () => {
                            let value = star.getAttribute("data-value");
                            ratingInput.value = value;

                            stars.forEach((s, i) => {
                                if (i < value) {
                                    s.classList.add("active");
                                } else {
                                    s.classList.remove("active");
                                }
                            });
                        });
                    });
                </script>

            </div>

        </div>
    </div>

</div>

{% endblock %}
