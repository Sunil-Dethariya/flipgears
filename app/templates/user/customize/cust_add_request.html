{% extends 'user\base.html' %}

{% block title %}FlipGears{% endblock %}

{% block content %}
{% load static %}



<head>
    <style>

        /* ===============================
   PAGE HEADER
================================*/

.page-header{
    position: relative;
    padding: 90px 0;
    color: #fff;
}

.page-header__inner{
    text-align:left;
}


/* Background Image */
.page-header__bg{
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-color: #131222;
    background-size: cover;
    background-position: center;
    z-index:-1;
}

/* Content */
.page-header__inner h3{
    font-size:38px;
    color:white;
    font-weight:700;
    margin-bottom:10px;
    letter-spacing:1px;
}

/* Breadcrumb */

.thm-breadcrumb{
    display:flex;
    justify-content:flex-start;
    gap:8px;
}

.thm-breadcrumb li{
    font-size:15px;
}

.thm-breadcrumb li a{
    color:#ddd;
    text-decoration:none;
    transition:0.3s;
}

.thm-breadcrumb li a:hover{
    color:#fff;
}

/* ===============================
   RESPONSIVE
================================*/

@media (max-width:768px){

.page-header{
    padding:70px 0;
}

.page-header__inner h3{
    font-size:28px;
}

}
/* ===============================
   PAGE HEADER END
================================*/
    </style>
</head>
        <!--Page Header Start -->
        <section class="page-header">
            <div class="page-header__bg" style="background-image: url(static/assets/images/backgrounds/page-header-bg.jpg);">
            </div>
            <div class="page-header__shape-1"></div>
            <div class="container">
                <div class="page-header__inner">
                    <h3>Customization</h3>
                    <div class="thm-breadcrumb__inner">
                        <ul class="thm-breadcrumb list-unstyled">
                            <li><a href="/">Home</a></li>

                        </ul>
                    </div>
                </div>
            </div>
        </section>
        <!--Page Header End -->


<div class="container mt-5">

<h2 class="text-center">Customize Your Product</h2>

<p class="text-center text-muted">
Select your product to start customization
</p>

<form method="POST">
{% csrf_token %}

<div class="mt-4">

<label>Select Product</label>

<select class="form-control" name="product">

<option value="">Select Product</option>
<option value="mobile">Mobile</option>
<option value="laptop">Laptop</option>
<!--<option value="headphone">Headphone</option>-->
<!--<option value="gaming">Gaming Setup</option>-->

</select>

</div>

<div class="mt-4">

<button class="btn btn-primary">Continue</button>

</div>

</form>

</div>


{% endblock %}
